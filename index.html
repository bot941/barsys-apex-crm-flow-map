<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX CRM v7 - Complete User Flow Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Space Grotesk',sans-serif; background:#0A0A0A; color:#E0E0E0; display:flex; height:100vh; overflow:hidden; }

  /* SIDEBAR */
  #sidebar { width:280px; background:#0F0F0F; border-right:1px solid #1E1E1E; display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; }
  #sidebar-header { padding:20px; border-bottom:1px solid #1E1E1E; }
  #sidebar-header h1 { font-size:18px; font-weight:700; color:#C8A97E; letter-spacing:1px; }
  #sidebar-header p { font-size:11px; color:#888; margin-top:4px; }
  #sidebar-nav { flex:1; overflow-y:auto; padding:8px; }
  #sidebar-nav::-webkit-scrollbar { width:4px; }
  #sidebar-nav::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }
  .nav-section { margin-bottom:4px; }
  .nav-section-title { font-size:10px; font-weight:600; color:#C8A97E; text-transform:uppercase; letter-spacing:1.5px; padding:12px 12px 6px; }
  .nav-item { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; cursor:pointer; transition:all 0.2s; font-size:12px; color:#999; }
  .nav-item:hover { background:#1A1A1A; color:#E0E0E0; }
  .nav-item.active { background:rgba(200,169,126,0.12); color:#C8A97E; font-weight:600; }
  .nav-icon { width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }

  /* MAIN */
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #topbar { height:56px; background:#0F0F0F; border-bottom:1px solid #1E1E1E; display:flex; align-items:center; padding:0 24px; gap:16px; flex-shrink:0; }
  #topbar h2 { font-size:16px; font-weight:600; color:#FFF; flex:1; }
  .stats-badge { background:#141414; border:1px solid #1E1E1E; border-radius:20px; padding:4px 12px; font-size:11px; color:#C8A97E; }
  #content { flex:1; overflow-y:auto; padding:32px; }
  #content::-webkit-scrollbar { width:6px; }
  #content::-webkit-scrollbar-thumb { background:#333; border-radius:4px; }

  /* FLOW CARDS */
  .flow-header { margin-bottom:24px; }
  .flow-header h2 { font-size:28px; font-weight:700; color:#FFF; margin-bottom:8px; }
  .flow-header p { font-size:14px; color:#888; line-height:1.6; max-width:800px; }
  .flow-section { margin-bottom:32px; }
  .flow-section h3 { font-size:18px; font-weight:600; color:#C8A97E; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid #1E1E1E; }

  .card { background:#141414; border:1px solid #1E1E1E; border-radius:12px; padding:20px; margin-bottom:16px; transition:all 0.3s; }
  .card:hover { border-color:#C8A97E; transform:translateY(-1px); }
  .card h4 { font-size:15px; font-weight:600; color:#FFF; margin-bottom:8px; }
  .card p { font-size:13px; color:#999; line-height:1.6; }
  .card .label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; display:inline-block; padding:2px 8px; border-radius:4px; }
  .label-agent { background:rgba(124,109,245,0.15); color:#7C6DF5; }
  .label-flow { background:rgba(200,169,126,0.15); color:#C8A97E; }
  .label-system { background:rgba(45,212,191,0.15); color:#2DD4BF; }
  .label-api { background:rgba(251,146,60,0.15); color:#FB923C; }

  /* PIPELINE TABLE */
  .pipeline-table { width:100%; border-collapse:collapse; margin:16px 0; }
  .pipeline-table th { text-align:left; font-size:11px; font-weight:600; color:#C8A97E; text-transform:uppercase; letter-spacing:1px; padding:8px 12px; border-bottom:1px solid #1E1E1E; }
  .pipeline-table td { font-size:12px; color:#CCC; padding:10px 12px; border-bottom:1px solid #111; vertical-align:top; }
  .pipeline-table tr:hover td { background:#1A1A1A; }

  /* AGENT GRID */
  .agent-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .agent-card { background:#141414; border:1px solid #1E1E1E; border-radius:12px; padding:20px; transition:all 0.3s; }
  .agent-card:hover { border-color:#7C6DF5; transform:translateY(-2px); box-shadow:0 8px 24px rgba(124,109,245,0.1); }
  .agent-name { font-size:16px; font-weight:700; color:#FFF; margin-bottom:2px; }
  .agent-role { font-size:11px; color:#7C6DF5; font-weight:600; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .agent-desc { font-size:12px; color:#999; line-height:1.5; margin-bottom:12px; }
  .agent-meta { display:flex; flex-wrap:wrap; gap:6px; }
  .agent-tag { font-size:10px; background:#1A1A1A; color:#888; padding:3px 8px; border-radius:4px; border:1px solid #222; }
  .agent-tag.schedule { color:#2DD4BF; border-color:rgba(45,212,191,0.3); }
  .agent-tag.wave { color:#C8A97E; border-color:rgba(200,169,126,0.3); }

  /* FLOW DIAGRAM */
  .flow-steps { display:flex; align-items:flex-start; gap:0; flex-wrap:wrap; margin:16px 0; }
  .flow-step { background:#141414; border:1px solid #1E1E1E; border-radius:10px; padding:14px 16px; min-width:140px; max-width:180px; text-align:center; position:relative; }
  .flow-step h5 { font-size:12px; font-weight:600; color:#FFF; margin-bottom:4px; }
  .flow-step p { font-size:10px; color:#888; }
  .flow-arrow { display:flex; align-items:center; color:#C8A97E; font-size:18px; padding:0 4px; margin-top:16px; }

  /* METRIC CARDS */
  .metrics-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:12px; margin:16px 0; }
  .metric-card { background:#141414; border:1px solid #1E1E1E; border-radius:10px; padding:16px; text-align:center; }
  .metric-value { font-size:24px; font-weight:700; color:#C8A97E; }
  .metric-label { font-size:11px; color:#888; margin-top:4px; }

  /* DETAIL LIST */
  .detail-list { list-style:none; margin:12px 0; }
  .detail-list li { font-size:13px; color:#CCC; padding:6px 0; border-bottom:1px solid #111; display:flex; gap:8px; }
  .detail-list li::before { content:""; width:6px; height:6px; background:#C8A97E; border-radius:50%; margin-top:6px; flex-shrink:0; }

  /* SCORING TABLE */
  .score-tier { display:flex; align-items:center; gap:8px; margin:8px 0; padding:10px 14px; background:#141414; border:1px solid #1E1E1E; border-radius:8px; }
  .score-tier .pts { font-size:20px; font-weight:700; color:#C8A97E; min-width:50px; }
  .score-tier .info { flex:1; }
  .score-tier .info h5 { font-size:13px; color:#FFF; font-weight:600; }
  .score-tier .info p { font-size:11px; color:#888; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>APEX CRM v7</h1>
    <p>Complete User Flow Map</p>
  </div>
  <div id="sidebar-nav"></div>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="topbar-title">Executive Summary</h2>
    <span class="stats-badge">25 AI Agents</span>
    <span class="stats-badge">150+ Endpoints</span>
    <span class="stats-badge">10-Stage Pipeline</span>
  </div>
  <div id="content"></div>
</div>

<script>
const SECTIONS = [
  { cat:"Overview", items:[
    { id:"exec", icon:"", title:"Executive Summary", render:renderExecSummary },
    { id:"arch", icon:"", title:"Architecture Overview", render:renderArchitecture },
    { id:"data", icon:"", title:"Data Models & Schema", render:renderDataModels },
    { id:"icp", icon:"", title:"ICP & Scoring", render:renderICP },
  ]},
  { cat:"AI Agents", items:[
    { id:"wave1", icon:"", title:"Wave 1: Core Pipeline (1-12)", render:renderWave1 },
    { id:"wave2", icon:"", title:"Wave 2: Sales Cycle (13-17)", render:renderWave2 },
    { id:"wave3", icon:"", title:"Wave 3: Intelligence (18-20)", render:renderWave3 },
    { id:"wave4", icon:"", title:"Wave 4: Learning (21-22)", render:renderWave4 },
    { id:"wave5", icon:"", title:"Wave 5: Pipeline Ops (23-25)", render:renderWave5 },
  ]},
  { cat:"Lead & Pipeline", items:[
    { id:"leads", icon:"", title:"Lead Management Flows", render:renderLeadMgmt },
    { id:"pipeline", icon:"", title:"10-Stage Pipeline", render:renderPipeline },
  ]},
  { cat:"Outreach Engine", items:[
    { id:"email", icon:"", title:"Email System & Hermes", render:renderEmail },
    { id:"campaigns", icon:"", title:"Campaign Management", render:renderCampaigns },
    { id:"sequences", icon:"", title:"Sequence Orchestration", render:renderSequences },
  ]},
  { cat:"AI & Intelligence", items:[
    { id:"scoring", icon:"", title:"AI Scoring & Recommendations", render:renderAIScoring },
    { id:"personalizer", icon:"", title:"Personalizer Engine", render:renderPersonalizer },
    { id:"pan", icon:"", title:"Pan Agent - Lead Sourcing", render:renderPan },
  ]},
  { cat:"Systems", items:[
    { id:"automation", icon:"", title:"Automation Rules Engine", render:renderAutomation },
    { id:"bounce", icon:"", title:"Bounce Detection & Re-Enrichment", render:renderBounce },
    { id:"linkedin", icon:"", title:"LinkedIn Prospecting", render:renderLinkedIn },
    { id:"intel", icon:"", title:"Market Intelligence", render:renderMarketIntel },
    { id:"calendar", icon:"", title:"Calendar & Meetings", render:renderCalendar },
    { id:"proposals", icon:"", title:"Proposal System & Tiers", render:renderProposals },
  ]},
  { cat:"Reporting", items:[
    { id:"reports", icon:"", title:"Reporting & Analytics", render:renderReports },
    { id:"eod", icon:"", title:"End-of-Day Report Engine", render:renderEOD },
  ]},
  { cat:"Infrastructure", items:[
    { id:"notifications", icon:"", title:"Notification System", render:renderNotifications },
    { id:"webhooks", icon:"", title:"Webhook Integration", render:renderWebhooks },
    { id:"rbac", icon:"", title:"User Management & RBAC", render:renderRBAC },
    { id:"scheduler", icon:"", title:"Autonomous Scheduler", render:renderScheduler },
    { id:"backup", icon:"", title:"Backup & Recovery", render:renderBackup },
    { id:"frontend", icon:"", title:"Frontend SPA & UI", render:renderFrontend },
    { id:"flags", icon:"", title:"v7 Feature Flags", render:renderFlags },
    { id:"guardrails", icon:"", title:"Guardrails & Compliance", render:renderGuardrails },
    { id:"infra", icon:"", title:"Infrastructure & Deployment", render:renderInfra },
    { id:"metrics", icon:"", title:"Performance & Projections", render:renderMetrics },
  ]}
];

// Build sidebar
const nav = document.getElementById('sidebar-nav');
SECTIONS.forEach(sec => {
  let h = document.createElement('div');
  h.className='nav-section';
  h.innerHTML=`<div class="nav-section-title">${sec.cat}</div>`;
  sec.items.forEach(item => {
    let d = document.createElement('div');
    d.className='nav-item';
    d.dataset.id=item.id;
    d.innerHTML=`<span class="nav-icon">${item.icon}</span>${item.title}`;
    d.onclick=()=>selectSection(item.id);
    h.appendChild(d);
  });
  nav.appendChild(h);
});

function selectSection(id) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector(`.nav-item[data-id="${id}"]`).classList.add('active');
  let section = SECTIONS.flatMap(s=>s.items).find(i=>i.id===id);
  document.getElementById('topbar-title').textContent=section.title;
  document.getElementById('content').innerHTML='';
  section.render(document.getElementById('content'));
}

function makeFlowSteps(steps){
  let html='<div class="flow-steps">';
  steps.forEach((s,i)=>{
    html+=`<div class="flow-step"><h5>${s.title}</h5><p>${s.desc||''}</p></div>`;
    if(i<steps.length-1) html+=`<div class="flow-arrow">&#8594;</div>`;
  });
  return html+'</div>';
}

function makeAgentCard(name,code,role,desc,schedule,wave,downstream){
  return `<div class="agent-card">
    <div class="agent-name">${name} <span style="color:#555;font-weight:400;font-size:12px">(${code})</span></div>
    <div class="agent-role">${role}</div>
    <div class="agent-desc">${desc}</div>
    <div class="agent-meta">
      <span class="agent-tag wave">Wave ${wave}</span>
      <span class="agent-tag schedule">${schedule}</span>
      ${downstream?`<span class="agent-tag">&#8594; ${downstream}</span>`:''}
    </div>
  </div>`;
}

// ========== RENDER FUNCTIONS ==========

      <p>APEX CRM is Barsys's AI-powered outbound sales operating system, purpose-built to drive corporate events revenue for the Barsys 360 AI Cocktail Machine. A full-stack platform that autonomously sources leads, scores them, executes multi-channel outreach, monitors replies, books meetings, generates proposals, and manages the entire sales pipeline.</p>

      ${makeFlowSteps([
        {title:'v1',desc:'Basic contact list'},
        {title:'v2',desc:'Email sequences'},
        {title:'v3',desc:'AI scoring'},
        {title:'v4',desc:'Campaign automation'},
        {title:'v5',desc:'LinkedIn + Market Intel'},
        {title:'v6',desc:'Company Universe (10K+)'},

function renderDataModels(el){
  el.innerHTML=`
    <div class="flow-header">
      <h2>Data Models & Database Schema</h2>
